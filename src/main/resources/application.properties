spring.application.name=evready-ai-recommender-service

server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/evready_recommender}
spring.datasource.username=${DB_USER:evready_recommender}
spring.datasource.password=${DB_PASSWORD:evready_recommender_pass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:/db/db.changelog-master.xml

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

evready.api.base-url=${EVREADY_API_BASE_URL:http://localhost:8080}

llm.provider=${LLM_PROVIDER:OLLAMA}
llm.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
llm.ollama.model=${OLLAMA_MODEL:qwen3:4b}
llm.ollama.temperature=${OLLAMA_TEMPERATURE:0}
llm.ollama.num-predict=${OLLAMA_NUM_PREDICT:512}
llm.ollama.num-ctx=${OLLAMA_NUM_CTX:4096}