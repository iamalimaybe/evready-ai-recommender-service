spring.application.name=evready-ai-recommender-service

server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/evready_recommender}
spring.datasource.username=${DB_USER:evready_recommender}
spring.datasource.password=${DB_PASSWORD:evready_recommender_pass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:/db/db.changelog-master.xml

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoints.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
management.endpoints.web.cors.allowed-methods=GET,OPTIONS

evready.api.base-url=${EVREADY_API_BASE_URL:http://localhost:8080}

llm.provider=${LLM_PROVIDER:OLLAMA}
llm.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
llm.ollama.connect-timeout=${OLLAMA_CONNECT_TIMEOUT:5s}
llm.ollama.read-timeout=${OLLAMA_READ_TIMEOUT:90s}
llm.ollama.model=${OLLAMA_MODEL:qwen3:4b}
llm.ollama.temperature=${OLLAMA_TEMPERATURE:0}
llm.ollama.num-predict=${OLLAMA_NUM_PREDICT:1024}
llm.ollama.num-ctx=${OLLAMA_NUM_CTX:4096}

recommendation.processing.core-pool-size=${RECOMMENDATION_PROCESSING_CORE_POOL_SIZE:1}
recommendation.processing.max-pool-size=${RECOMMENDATION_PROCESSING_MAX_POOL_SIZE:1}
recommendation.processing.queue-capacity=${RECOMMENDATION_PROCESSING_QUEUE_CAPACITY:10}

logging.file.name=${LOG_FILE:${LOG_PATH:logs}/evready-ai-recommender.log}
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE:${LOG_PATH:logs}/evready-ai-recommender.log}.%d{yyyy-MM-dd}.%i.gz
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=500MB